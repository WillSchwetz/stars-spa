/* ============================================================
   STARFIELD (twinkling galaxy background)
   ============================================================ */
(function () {
  const sky = document.getElementById("starfield");
  const ctx = sky.getContext("2d");
  let stars = [], shoot = null, w = 0, h = 0;
  const palette = ["#ffffff", "#cfe0ff", "#ffe6c2", "#d9c2ff"];
  function init() {
    w = sky.width = innerWidth; h = sky.height = innerHeight;
    const n = Math.min(320, Math.floor(w * h / 7000));
    stars = [];
    for (let i = 0; i < n; i++) stars.push({
      x: Math.random() * w, y: Math.random() * h,
      r: Math.random() * 1.5 + 0.2, base: Math.random() * 0.5 + 0.25,
      ph: Math.random() * Math.PI * 2, sp: Math.random() * 0.0016 + 0.0004,
      c: palette[(Math.random() * palette.length) | 0]
    });
  }
  function maybeShoot() {
    if (shoot || Math.random() > 0.004) return;
    shoot = { x: Math.random() * w * 0.6, y: Math.random() * h * 0.4, len: 0, max: 120 + Math.random() * 160, a: 1 };
  }
  function loop(t) {
    ctx.clearRect(0, 0, w, h);
    for (const s of stars) {
      const a = s.base + Math.sin(t * s.sp + s.ph) * 0.35;
      ctx.globalAlpha = Math.max(0, Math.min(1, a));
      ctx.fillStyle = s.c;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 6.283); ctx.fill();
    }
    maybeShoot();
    if (shoot) {
      shoot.len += 9; shoot.a -= 0.012;
      const dx = shoot.len, dy = shoot.len * 0.5;
      const g = ctx.createLinearGradient(shoot.x, shoot.y, shoot.x + dx, shoot.y + dy);
      g.addColorStop(0, "rgba(255,255,255,0)");
      g.addColorStop(1, "rgba(255,255,255," + Math.max(0, shoot.a) + ")");
      ctx.globalAlpha = 1; ctx.strokeStyle = g; ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.moveTo(shoot.x, shoot.y); ctx.lineTo(shoot.x + dx, shoot.y + dy); ctx.stroke();
      if (shoot.len > shoot.max || shoot.a <= 0) shoot = null;
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(loop);
  }
  init(); requestAnimationFrame(loop);
  addEventListener("resize", init);
})();

  { from:"Ford", to:"Land Rover", type:"owner", status:"former", year:"2000–2008", model:"—", title:"Ford owned Land Rover",
    details:"Ford bought Land Rover from BMW in 2000 and ran it alongside Jaguar before selling both to Tata Motors in 2008." }

/* ============================================================
   BUILD NODES & EDGES
   ============================================================ */
function hexToRgba(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${(n>>16)&255}, ${(n>>8)&255}, ${n&255}, ${a})`;
}

// degree per manufacturer (drives star size/brightness)
const degree = {};
CONNECTIONS.forEach(c => { degree[c.from] = (degree[c.from]||0)+1; degree[c.to] = (degree[c.to]||0)+1; });

const mfrSet = new Set();
CONNECTIONS.forEach(c => { mfrSet.add(c.from); mfrSet.add(c.to); });

const nodeArr = [];
[...mfrSet].forEach(name => {
  const g = MANUFACTURERS[name] || "indep";
  const color = GROUPS[g].color;
  nodeArr.push({
    id: name, label: name, kind: "mfr", value: degree[name] || 1,
    shape: "dot",
    color: { background: color, border: "rgba(255,255,255,0.55)",
             highlight: { background: color, border: "#ffffff" } },
    font: { color: "#f3f6ff", size: 15, strokeWidth: 3, strokeColor: "rgba(0,0,0,0.85)" },
    shadow: { enabled: true, color: hexToRgba(color, 0.85), size: 26, x: 0, y: 0 },
    borderWidth: 1.5
  });
});

const edgeArr = [];
let modelLabelsVisible = true;
CONNECTIONS.forEach((c, i) => {
  if (c.type === "collab") {
    const mid = "m" + i;
    nodeArr.push({
      id: mid, label: c.short, kind: "model", _idx: i,
      shape: "dot", size: 7,
      color: { background: "#ffe6ad", border: "rgba(255,255,255,0.7)",
               highlight: { background: "#fff3d6", border: "#ffffff" } },
      font: { color: "#f0cf8e", size: 11, strokeWidth: 3, strokeColor: "rgba(0,0,0,0.8)" },
      shadow: { enabled: true, color: "rgba(255,206,122,0.85)", size: 16, x: 0, y: 0 },
      borderWidth: 1
    });
    edgeArr.push({ id: "e"+i+"a", from: c.from, to: mid, _idx: i, _kind: "collab", _status: c.status });
    edgeArr.push({ id: "e"+i+"b", from: mid, to: c.to, _idx: i, _kind: "collab", _status: c.status });
  } else {
    edgeArr.push({ id: "e"+i, from: c.from, to: c.to, _idx: i, _kind: "owner", _status: c.status });
  }
});

function edgeStyle(e, on) {
  const collab = e._kind === "collab";
  const base = collab ? "#ffb84d" : "#4ee0c0";
  return {
    id: e.id,
    color: { color: base, opacity: on ? (collab ? 0.8 : 0.65) : 0.05, highlight: "#ffffff", hover: "#ffffff" },
    width: on ? (collab ? 2.4 : 2.0) : (collab ? 1.5 : 1.3),
    dashes: e._status === "former" ? [6, 6] : false,
    shadow: { enabled: on, color: base, size: on ? 12 : 0, x: 0, y: 0 },
    smooth: { enabled: true, type: "continuous", roundness: 0.4 }
  };
}
edgeArr.forEach(e => Object.assign(e, edgeStyle(e, true)));

const nodes = new vis.DataSet(nodeArr);
const edges = new vis.DataSet(edgeArr);

/* ============================================================
   NETWORK
   ============================================================ */
const options = {
  physics: {
    solver: "barnesHut",
    barnesHut: { gravitationalConstant: -9500, springLength: 120, springConstant: 0.025, damping: 0.45, avoidOverlap: 0.25 },
    stabilization: { iterations: 280 }
  },
  interaction: { hover: true, tooltipDelay: 150, navigationButtons: false, keyboard: false },
  nodes: {
    borderWidth: 1.5,
    scaling: { min: 12, max: 40, label: { enabled: false } }
  },
  edges: { selectionWidth: 0, hoverWidth: 0 }
};
const network = new vis.Network(document.getElementById("network"), { nodes, edges }, options);

network.once("stabilizationIterationsDone", () => {
  network.setOptions({ physics: { stabilization: false } });
  network.fit({ animation: { duration: 700 } });
});

/* ============================================================
   PANEL
   ============================================================ */
const panel = document.getElementById("panel");
const panelContent = document.getElementById("panel-content");

function showWelcome() {
  const collabCount = CONNECTIONS.filter(c => c.type === "collab").length;
  panelContent.innerHTML = `
    <h2>Explore the galaxy</h2>
    <div class="stat-row">
      <div class="stat"><b>${mfrSet.size}</b><span>manufacturers</span></div>
      <div class="stat"><b>${collabCount}</b><span>shared models</span></div>
      <div class="stat"><b>${CONNECTIONS.length}</b><span>connections</span></div>
    </div>
    <p class="hint">
      Each <b style="color:#ffe6ad">★ star</b> is a car maker — brighter and bigger the more ties it has.<br><br>
      Each <b style="color:#ffe6ad">• planet</b> is a model two makers built together; it sits on the line between its two stars.<br><br>
      <span style="color:var(--collab)">Gold</span> lines are <b>collaborations</b>; <span style="color:var(--owner)">teal</span> lines are <b>ownership</b>. <b>Dashed</b> means the relationship has ended.<br><br>
      Click a planet or line for the story, or click a star to spotlight its whole constellation.
    </p>`;
  panel.classList.remove("hidden");
}

function showConnection(idx) {
  const m = CONNECTIONS[idx];
  const isCollab = m.type === "collab";
  panelContent.innerHTML = `
    <span class="close-x" onclick="window._closePanel()">×</span>
    <span class="badge ${isCollab ? "collab" : "owner"}">${isCollab ? "Collaboration" : "Ownership"}${m.status === "former" ? " · former" : ""}</span>
    <h2>${m.title}</h2>
    <div class="sub">${m.year}</div>
    <div class="field">
      <div class="label">Manufacturers</div>
      <div class="mfr-chips"><span class="mfr-chip">${m.from}</span><span class="mfr-chip">${m.to}</span></div>
    </div>
    ${m.model && m.model !== "—" ? `<div class="field"><div class="label">Model${/[&/]/.test(m.model) ? "s" : ""}</div><div class="value">${m.model}</div></div>` : ""}
    <div class="field"><div class="label">The story</div><div class="detail-body">${m.details}</div></div>`;
  panel.classList.remove("hidden");
}

function showNodeSummary(id) {
  const eids = network.getConnectedEdges(id);
  const idxs = [...new Set(eids.map(eid => edges.get(eid)._idx))];
  const rels = idxs.map(i => ({ i, c: CONNECTIONS[i] }));
  const collabs = rels.filter(r => r.c.type === "collab");
  const owns = rels.filter(r => r.c.type === "owner");
  const li = r => `<li onclick="window._openConn(${r.i})"><span style="color:${r.c.type==='collab'?'var(--collab)':'var(--owner)'}">●</span> ${r.c.title}</li>`;
  panelContent.innerHTML = `
    <span class="close-x" onclick="window._closePanel()">×</span>
    <span class="badge mfr">Manufacturer</span>
    <h2>${id}</h2>
    <div class="sub">${GROUPS[MANUFACTURERS[id]||'indep'].label} · ${rels.length} connection${rels.length!==1?'s':''}</div>
    ${collabs.length ? `<div class="field"><div class="label">Built models with</div><ul class="rel-list">${collabs.map(li).join("")}</ul></div>` : ""}
    ${owns.length ? `<div class="field"><div class="label">Ownership ties</div><ul class="rel-list">${owns.map(li).join("")}</ul></div>` : ""}
    <p class="hint" style="font-size:13px;">Click any item above, or a planet/line in the map, for the full story.</p>`;
  panel.classList.remove("hidden");
}

window._closePanel = () => { panel.classList.add("hidden"); network.unselectAll(); resetHighlight(); };
window._openConn = idx => { highlightConnection(idx); showConnection(idx); };

/* ============================================================
   HIGHLIGHTING
   ============================================================ */
function applyHighlight(activeEdgeIds) {
  const activeSet = new Set(activeEdgeIds.map(String));
  const all = edges.get();
  edges.update(all.map(e => {
    if (e.hidden) return { id: e.id };
    return edgeStyle(e, activeSet.size === 0 ? true : activeSet.has(String(e.id)));
  }));
  const keep = new Set();
  activeEdgeIds.forEach(id => { const e = edges.get(id); if (e) { keep.add(e.from); keep.add(e.to); } });
  nodes.update(nodes.get().map(n => ({ id: n.id, opacity: (activeEdgeIds.length === 0 || keep.has(n.id)) ? 1 : 0.16 })));
}
function highlightConnection(idx) {
  applyHighlight(edges.get().filter(e => e._idx === idx).map(e => e.id));
}
function highlightForNode(id) {
  let active = network.getConnectedEdges(id);
  network.getConnectedNodes(id).forEach(n => {
    if ((nodes.get(n)||{}).kind === "model")
      network.getConnectedEdges(n).forEach(eid => { if (!active.includes(eid)) active.push(eid); });
  });
  applyHighlight(active);
}
function resetHighlight() { applyHighlight([]); }

/* ============================================================
   INTERACTIONS
   ============================================================ */
network.on("click", params => {
  if (params.nodes.length) {
    const id = params.nodes[0];
    const node = nodes.get(id);
    if (node.kind === "model") { highlightConnection(node._idx); showConnection(node._idx); }
    else { highlightForNode(id); showNodeSummary(id); }
  } else if (params.edges.length) {
    const e = edges.get(params.edges[0]);
    highlightConnection(e._idx); showConnection(e._idx);
  } else { resetHighlight(); panel.classList.add("hidden"); }
});

/* Filters */
document.querySelectorAll("[data-filter]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("[data-filter]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const f = btn.dataset.filter;
    edges.update(edges.get().map(e => {
      const visible = f === "all" || e._kind === f;
      return Object.assign(edgeStyle(e, true), { hidden: !visible });
    }));
    // hide model planets when viewing ownership only
    nodes.update(nodes.get().map(n => n.kind === "model"
      ? { id: n.id, hidden: f === "owner", opacity: 1 }
      : { id: n.id, opacity: 1 }));
  });
});

/* Toggle model names */
document.getElementById("toggleNames").addEventListener("click", e => {
  modelLabelsVisible = !modelLabelsVisible;
  e.target.textContent = modelLabelsVisible ? "Hide model names" : "Show model names";
  e.target.classList.toggle("active", !modelLabelsVisible);
  nodes.update(nodes.get().filter(n => n.kind === "model").map(n => ({
    id: n.id, font: { color: modelLabelsVisible ? "#f0cf8e" : "rgba(0,0,0,0)", size: 11, strokeWidth: modelLabelsVisible ? 3 : 0, strokeColor: "rgba(0,0,0,0.8)" }
  })));
});

/* Search */
const search = document.getElementById("search");
search.addEventListener("input", () => {
  const q = search.value.trim().toLowerCase();
  if (!q) { resetHighlight(); return; }
  const matches = nodes.get().filter(n => n.kind === "mfr" && n.label.toLowerCase().includes(q)).map(n => n.id);
  nodes.update(nodes.get().map(n => ({ id: n.id, opacity: matches.includes(n.id) ? 1 : 0.14 })));
  if (matches.length === 1) network.focus(matches[0], { scale: 1.1, animation: true });
});
search.addEventListener("keydown", ev => {
  if (ev.key !== "Enter") return;
  const q = search.value.trim().toLowerCase();
  const m = nodes.get().find(n => n.kind === "mfr" && n.label.toLowerCase().includes(q));
  if (m) { network.selectNodes([m.id]); highlightForNode(m.id); showNodeSummary(m.id); network.focus(m.id, { scale: 1.2, animation: true }); }
});

/* Reset / physics */
document.getElementById("fit").addEventListener("click", () => {
  resetHighlight(); search.value = "";
  document.querySelectorAll("[data-filter]").forEach(b => b.classList.toggle("active", b.dataset.filter === "all"));
  edges.update(edges.get().map(e => Object.assign(edgeStyle(e, true), { hidden: false })));
  nodes.update(nodes.get().map(n => ({ id: n.id, hidden: false, opacity: 1 })));
  network.fit({ animation: true }); panel.classList.add("hidden");
});
let physicsOn = true;
const physBtn = document.getElementById("physics");
physBtn.addEventListener("click", () => {
  physicsOn = !physicsOn;
  network.setOptions({ physics: { enabled: physicsOn } });
  physBtn.textContent = physicsOn ? "Pause drift" : "Resume drift";
  physBtn.classList.toggle("active", !physicsOn);
});

showWelcome();
</script>
